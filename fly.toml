app = "nightingalebot-xp"
primary_region = "iad"

[build]

[env]
  DB_PATH = "/data/xp.sqlite"

[mounts]
  source = "xpdata"
  destination = "/data"

# Expose HTTP for Fourthwall webhook receiver. POST /fw-webhook reaches the
# Node http server inside the container.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

# Keep the machine running 24/7. With `on-failure` (Fly's default) a clean
# exit leaves the machine stopped — Discord then shows the bot offline.
# `always` brings it back up no matter how it exited.
[[restart]]
  policy = "always"
  max_retries = 10
